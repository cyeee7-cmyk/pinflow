<!-- PinFlow Demo Widget - Layer 2 Enhanced Version -->
<!-- 支持 deal/content 两种模式 + 图片合成预览 -->

<style>
.demo-section {
  background: var(--cream-2);
  border-top: 1px solid var(--bdr);
  border-bottom: 1px solid var(--bdr);
  padding: 80px 0;
}

.demo-inner {
  max-width: 820px;
  margin: 0 auto;
  padding: 0 28px;
}

.demo-header {
  text-align: center;
  margin-bottom: 40px;
}

.demo-eyebrow {
  display: inline-block;
  font-size: 11.5px;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--red);
  margin-bottom: 12px;
}

.demo-title {
  font-family: var(--serif);
  font-size: clamp(26px, 3.5vw, 38px);
  font-weight: 800;
  color: var(--t1);
  line-height: 1.2;
  margin-bottom: 8px;
}

.demo-sub {
  color: var(--t2);
  font-size: 15px;
}

/* Input section */
.demo-controls {
  display: flex;
  flex-direction: column;
  gap: 14px;
  margin-bottom: 24px;
}

.demo-input-row {
  display: flex;
  gap: 10px;
}

.demo-input {
  flex: 1;
  padding: 13px 18px;
  border: 1.5px solid var(--bdr-hi);
  border-radius: var(--r-md);
  background: var(--white);
  font-family: var(--sans);
  font-size: 14px;
  color: var(--t1);
  transition: border-color 0.2s, box-shadow 0.2s;
}

.demo-input:focus {
  outline: none;
  border-color: var(--red);
  box-shadow: 0 0 0 3px rgba(200, 52, 74, 0.08);
}

.demo-input::placeholder { color: var(--t3); }

.demo-btn {
  padding: 13px 26px;
  background: var(--red);
  color: #fff;
  border: none;
  border-radius: var(--r-md);
  font-family: var(--sans);
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
}

.demo-btn:hover:not(:disabled) {
  background: var(--red-h);
  transform: translateY(-1px);
  box-shadow: 0 6px 20px rgba(200, 52, 74, 0.3);
}

.demo-btn:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

.demo-post-type {
  display: flex;
  gap: 8px;
  padding: 8px;
  background: var(--white);
  border-radius: var(--r-md);
  border: 1px solid var(--bdr);
}

.post-type-btn {
  flex: 1;
  padding: 9px 12px;
  border: 1.5px solid transparent;
  border-radius: 8px;
  background: var(--cream-3);
  color: var(--t2);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}

.post-type-btn.active {
  background: var(--red);
  color: white;
  border-color: var(--red);
}

.post-type-btn:hover:not(.active) {
  border-color: var(--red);
  color: var(--red);
}

.compose-toggle {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  background: var(--white);
  border: 1px solid var(--bdr);
  border-radius: 8px;
  font-size: 13px;
  color: var(--t2);
}

.compose-toggle input[type="checkbox"] {
  width: 18px;
  height: 18px;
  cursor: pointer;
}

/* Status */
.demo-status {
  display: none;
  align-items: center;
  gap: 10px;
  padding: 12px 16px;
  border-radius: var(--r-sm);
  font-size: 13.5px;
  margin-bottom: 20px;
}

.demo-status.loading {
  display: flex;
  background: var(--petal);
  color: var(--t2);
}

.demo-status.error {
  display: flex;
  background: #fff0f2;
  color: #b02a3d;
  border: 1px solid rgba(200, 52, 74, 0.2);
}

.demo-spinner {
  width: 16px; height: 16px;
  border: 2px solid var(--rose);
  border-top-color: var(--red);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  flex-shrink: 0;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* Product + Copies Layout */
.demo-result {
  display: none;
}

.demo-result.visible {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
  margin-top: 32px;
}

.demo-product-section {
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.demo-product-card {
  background: var(--white);
  border: 1.5px solid var(--bdr-hi);
  border-radius: var(--r-lg);
  overflow: hidden;
}

.demo-product-img {
  width: 100%;
  height: 280px;
  object-fit: contain;
  background: var(--cream-3);
}

.demo-product-info {
  padding: 18px;
}

.demo-product-brand {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--t3);
  margin-bottom: 6px;
}

.demo-product-title {
  font-family: var(--serif);
  font-size: 15px;
  font-weight: 700;
  color: var(--t1);
  line-height: 1.4;
  margin-bottom: 12px;
}

.demo-price-row {
  display: flex;
  align-items: baseline;
  gap: 10px;
}

.demo-price-current {
  font-size: 20px;
  font-weight: 800;
  color: var(--red);
}

.demo-price-original {
  font-size: 13px;
  color: var(--t3);
  text-decoration: line-through;
}

.demo-discount-badge {
  font-size: 11px;
  font-weight: 700;
  padding: 2px 8px;
  background: var(--blush);
  color: var(--red);
  border-radius: 20px;
}

/* Copies Section */
.demo-copies-section {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.demo-copies-title {
  font-family: var(--serif);
  font-size: 15px;
  font-weight: 700;
  color: var(--t1);
  margin-bottom: 4px;
}

.demo-copy-card {
  background: var(--white);
  border: 1.5px solid var(--bdr);
  border-radius: var(--r-md);
  padding: 16px;
  transition: border-color 0.2s, box-shadow 0.2s;
}

.demo-copy-card:hover {
  border-color: var(--rose);
  box-shadow: 0 4px 16px rgba(160, 90, 80, 0.07);
}

.copy-style-badge {
  display: inline-block;
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  padding: 3px 8px;
  border-radius: 16px;
  margin-bottom: 8px;
  background: var(--blush);
  color: var(--red);
}

.demo-copy-title {
  font-weight: 700;
  font-size: 13px;
  color: var(--t1);
  margin-bottom: 6px;
  line-height: 1.4;
}

.demo-copy-desc {
  font-size: 12px;
  color: var(--t2);
  line-height: 1.6;
  margin-bottom: 8px;
}

.demo-copy-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-bottom: 10px;
}

.demo-copy-tag {
  font-size: 11px;
  color: var(--red);
  background: var(--red-soft);
  border-radius: 16px;
  padding: 2px 8px;
  font-weight: 600;
}

.demo-copy-actions {
  display: flex;
  gap: 6px;
}

.demo-copy-btn {
  font-size: 11px;
  font-weight: 700;
  padding: 5px 11px;
  border: none;
  border-radius: 6px;
  background: var(--cream-3);
  color: var(--t2);
  cursor: pointer;
  transition: all 0.15s;
}

.demo-copy-btn:hover {
  background: var(--blush-2);
  color: var(--red);
}

.demo-copy-btn.copied {
  background: #e8f5e9;
  color: #2e7d32;
}

@media (max-width: 820px) {
  .demo-result.visible {
    grid-template-columns: 1fr;
  }

  .demo-input-row {
    flex-direction: column;
  }

  .demo-post-type {
    flex-direction: column;
  }
}
</style>

<section class="demo-section" id="demo">
  <div class="demo-inner">
    <div class="demo-header">
      <div class="demo-eyebrow">Try it live</div>
      <h2 class="demo-title">Paste an Amazon link.<br><em>Get 3 Pinterest pins instantly.</em></h2>
      <p class="demo-sub">See AI-generated titles, descriptions & hashtags ready to post.</p>
    </div>

    <div class="demo-controls">
      <div class="demo-input-row">
        <input
          id="demo-url-input"
          class="demo-input"
          type="url"
          placeholder="https://www.amazon.com/dp/B0XXXXXX"
          autocomplete="off"
          spellcheck="false"
        />
        <button class="demo-btn" id="demo-generate-btn" onclick="runDemo()">
          Generate ✨
        </button>
      </div>

      <div style="display: flex; gap: 12px; flex-wrap: wrap; align-items: center;">
        <div class="demo-post-type">
          <button class="post-type-btn active" onclick="setPostType('deal')">
            💰 Deal Pins
          </button>
          <button class="post-type-btn" onclick="setPostType('content')">
            ✨ Lifestyle Pins
          </button>
        </div>
        <label class="compose-toggle">
          <input type="checkbox" id="demo-compose-check" />
          Compose image
        </label>
      </div>
    </div>

    <!-- Status bar -->
    <div class="demo-status" id="demo-status">
      <div class="demo-spinner" id="demo-spinner"></div>
      <span id="demo-status-text">Fetching…</span>
    </div>

    <!-- Result grid -->
    <div class="demo-result" id="demo-result">
      <!-- Product section -->
      <div class="demo-product-section">
        <div class="demo-product-card">
          <img id="demo-product-img" class="demo-product-img" src="" alt="" />
        </div>
        <div class="demo-product-info" style="background: white; border: 1px solid var(--bdr); border-radius: var(--r-md); padding: 14px;">
          <div class="demo-product-brand" id="demo-product-brand"></div>
          <div class="demo-product-title" id="demo-product-title"></div>
          <div class="demo-price-row">
            <span class="demo-price-current" id="demo-price-current"></span>
            <span class="demo-price-original" id="demo-price-original"></span>
            <span class="demo-discount-badge" id="demo-discount-badge" style="display:none"></span>
          </div>
        </div>
      </div>

      <!-- Copies section -->
      <div class="demo-copies-section">
        <div class="demo-copies-title" id="demo-copies-title">3 Ready-to-Post Pins</div>
        <div id="demo-copies-grid"></div>
      </div>
    </div>
  </div>
</section>

<script>
const API_BASE = 'YOUR_API_BASE_URL'; // 替换为你的 Vercel 链接
let currentPostType = 'deal';

function setPostType(type) {
  currentPostType = type;
  document.querySelectorAll('.post-type-btn').forEach((btn) => {
    btn.classList.toggle('active', btn.textContent.includes(type === 'deal' ? 'Deal' : 'Lifestyle'));
  });
}

function setStatus(msg, type = 'loading') {
  const el = document.getElementById('demo-status');
  const txt = document.getElementById('demo-status-text');
  const spinner = document.getElementById('demo-spinner');
  el.className = 'demo-status ' + type;
  txt.textContent = msg;
  spinner.style.display = type === 'loading' ? 'block' : 'none';
}

function hideStatus() {
  document.getElementById('demo-status').className = 'demo-status';
}

function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function showResult(product, copies) {
  const result = document.getElementById('demo-result');

  // 产品信息
  document.getElementById('demo-product-img').src = product.imageUrl || '';
  document.getElementById('demo-product-brand').textContent = product.brand || '';
  document.getElementById('demo-product-title').textContent = product.title || '';

  if (product.currentPrice) {
    document.getElementById('demo-price-current').textContent = `$${product.currentPrice.toFixed(2)}`;
  }
  if (product.originalPrice) {
    document.getElementById('demo-price-original').textContent = `$${product.originalPrice.toFixed(2)}`;
  } else {
    document.getElementById('demo-price-original').textContent = '';
  }

  if (product.discountPercent) {
    const badge = document.getElementById('demo-discount-badge');
    badge.textContent = `-${product.discountPercent}%`;
    badge.style.display = 'inline-block';
  } else {
    document.getElementById('demo-discount-badge').style.display = 'none';
  }

  // 生成的副本
  const grid = document.getElementById('demo-copies-grid');
  grid.innerHTML = '';
  copies.forEach((copy, idx) => {
    const card = document.createElement('div');
    card.className = 'demo-copy-card';
    const tagsHtml = (copy.hashtags || [])
      .map((t) => `<span class="demo-copy-tag">#${escHtml(t)}</span>`)
      .join('');

    card.innerHTML = `
      <span class="copy-style-badge">${copy.style}</span>
      <div class="demo-copy-title">${escHtml(copy.pin_title)}</div>
      <div class="demo-copy-desc">${escHtml(copy.pin_description)}</div>
      <div class="demo-copy-tags">${tagsHtml}</div>
      <div class="demo-copy-actions">
        <button class="demo-copy-btn" onclick="copyToClipboard(this, '${escAttr(copy.pin_title + '\n\n' + copy.pin_description + '\n\n' + copy.hashtags.map((t) => '#' + t).join(' '))}')">
          Copy
        </button>
        ${copy.affiliate_link ? `<a class="demo-copy-btn" href="${escAttr(copy.affiliate_link)}" target="_blank" style="text-decoration: none; display: inline-block;">Link</a>` : ''}
      </div>
    `;
    grid.appendChild(card);
  });

  result.classList.add('visible');
}

function escAttr(str) {
  return String(str).replace(/'/g, "\\'").replace(/`/g, '\\`');
}

async function copyToClipboard(btn, text) {
  try {
    await navigator.clipboard.writeText(text);
    btn.textContent = '✓ Copied!';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = 'Copy';
      btn.classList.remove('copied');
    }, 2000);
  } catch {
    btn.textContent = 'Failed';
  }
}

async function runDemo() {
  const input = document.getElementById('demo-url-input');
  const btn = document.getElementById('demo-generate-btn');
  const url = input.value.trim();
  const composeImage = document.getElementById('demo-compose-check').checked;

  if (!url) {
    input.focus();
    return;
  }

  btn.disabled = true;
  document.getElementById('demo-result').classList.remove('visible');
  setStatus('Fetching product…', 'loading');

  try {
    const res = await fetch(`${API_BASE}/api/generate`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        url,
        postType: currentPostType,
        composeImage,
      }),
    });

    const data = await res.json();

    if (!res.ok || !data.success) {
      setStatus(data.error || 'Something went wrong', 'error');
      return;
    }

    hideStatus();
    showResult(data.product, data.copies);
    document.getElementById('demo-result').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  } catch (err) {
    setStatus('Network error – check your backend URL', 'error');
    console.error(err);
  } finally {
    btn.disabled = false;
  }
}

document.getElementById('demo-url-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') runDemo();
});
</script>
