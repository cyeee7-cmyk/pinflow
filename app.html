<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PinFlow - Pinterest 自动化生成工具</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      color: white;
      margin-bottom: 40px;
      padding: 20px 0;
    }

    header h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    header p {
      font-size: 1.1rem;
      opacity: 0.9;
    }

    .tool-panel {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
      margin-bottom: 40px;
    }

    .input-section {
      background: white;
      border-radius: 12px;
      padding: 30px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
    }

    .input-section h2 {
      font-size: 1.3rem;
      margin-bottom: 20px;
      color: #333;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #555;
      font-weight: 500;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 1rem;
      font-family: inherit;
    }

    .form-group textarea {
      resize: vertical;
      min-height: 100px;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .button-group {
      display: flex;
      gap: 10px;
      margin-top: 30px;
    }

    button {
      flex: 1;
      padding: 12px 24px;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-generate {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-generate:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
    }

    .btn-secondary {
      background: #f0f0f0;
      color: #333;
    }

    .btn-secondary:hover {
      background: #e0e0e0;
    }

    .output-section {
      background: white;
      border-radius: 12px;
      padding: 30px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
    }

    .output-section h2 {
      font-size: 1.3rem;
      margin-bottom: 20px;
      color: #333;
    }

    .output-content {
      background: #f9f9f9;
      border-radius: 8px;
      padding: 20px;
      min-height: 300px;
      border: 2px dashed #ddd;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #999;
      text-align: center;
    }

    .output-content.ready {
      border-color: #667eea;
      color: #333;
      border-style: solid;
      background: #f5f7ff;
    }

    .loading {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid #f3f3f3;
      border-top: 3px solid #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-right: 10px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .tab-group {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      border-bottom: 2px solid #eee;
    }

    .tab {
      padding: 12px 20px;
      background: none;
      border: none;
      cursor: pointer;
      color: #999;
      font-weight: 600;
      border-bottom: 3px solid transparent;
      transition: all 0.3s ease;
    }

    .tab.active {
      color: #667eea;
      border-bottom-color: #667eea;
    }

    .image-gallery {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      margin-top: 20px;
    }

    .image-item {
      background: #f9f9f9;
      border-radius: 8px;
      padding: 15px;
      text-align: center;
    }

    .image-item img {
      max-width: 100%;
      border-radius: 6px;
      margin-bottom: 10px;
    }

    .copy-btn {
      padding: 6px 12px;
      font-size: 0.85rem;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    .copy-btn:hover {
      background: #764ba2;
    }

    @media (max-width: 768px) {
      .tool-panel {
        grid-template-columns: 1fr;
      }

      header h1 {
        font-size: 1.8rem;
      }

      .image-gallery {
        grid-template-columns: 1fr;
      }
    }

    .status {
      padding: 15px;
      border-radius: 6px;
      margin-top: 20px;
      display: none;
    }

    .status.show {
      display: block;
    }

    .status.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }

    .status.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🎨 PinFlow</h1>
      <p>AI 驱动的 Pinterest 内容自动化生成工具</p>
    </header>

    <div class="tool-panel">
      <!-- 输入面板 -->
      <div class="input-section">
        <h2>📝 输入</h2>
        
        <div class="form-group">
          <label for="url">商品链接</label>
          <input 
            type="url" 
            id="url" 
            placeholder="https://amazon.com/dp/..." 
            value="https://amazon.com/dp/B0CRMZHDG8"
          >
        </div>

        <div class="form-group">
          <label for="postType">内容类型</label>
          <select id="postType">
            <option value="deal">💰 优惠信息</option>
            <option value="content">✨ 生活方式</option>
          </select>
        </div>

        <div class="form-group">
          <label for="template">图片模板</label>
          <select id="template">
            <option value="auto">自动选择</option>
            <option value="deal">优惠模板</option>
            <option value="content">内容模板</option>
            <option value="premium">高级模板</option>
          </select>
        </div>

        <div class="button-group">
          <button class="btn-generate" onclick="generateContent()">🚀 生成</button>
          <button class="btn-secondary" onclick="clearForm()">🔄 清空</button>
        </div>

        <div class="status" id="status"></div>
      </div>

      <!-- 输出面板 -->
      <div class="output-section">
        <h2>📊 结果</h2>
        
        <div class="tab-group">
          <button class="tab active" onclick="switchTab('preview')">预览</button>
          <button class="tab" onclick="switchTab('json')">数据</button>
          <button class="tab" onclick="switchTab('export')">导出</button>
        </div>

        <!-- 预览 Tab -->
        <div id="preview-tab" class="tab-content">
          <div id="preview-content" class="output-content">
            点击"生成"按钮开始...
          </div>
        </div>

        <!-- 数据 Tab -->
        <div id="json-tab" class="tab-content" style="display:none;">
          <textarea style="width:100%;height:300px;padding:10px;border:1px solid #ddd;border-radius:6px;" id="json-output" readonly></textarea>
          <button class="copy-btn" onclick="copyJSON()" style="margin-top:10px;width:100%;">📋 复制 JSON</button>
        </div>

        <!-- 导出 Tab -->
        <div id="export-tab" class="tab-content" style="display:none;">
          <div class="form-group">
            <label for="exportFormat">导出格式</label>
            <select id="exportFormat">
              <option value="tailwind">Tailwind Pins CSV</option>
              <option value="later">Later CSV</option>
              <option value="buffer">Buffer JSON</option>
              <option value="generic">通用 CSV</option>
            </select>
          </div>
          <button class="btn-generate" onclick="exportData()" style="width:100%;margin-top:10px;">📥 下载导出</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = '/api';

    async function generateContent() {
      const url = document.getElementById('url').value;
      const postType = document.getElementById('postType').value;
      const template = document.getElementById('template').value;

      if (!url) {
        showStatus('请输入商品链接', 'error');
        return;
      }

      showStatus('生成中... 🔄', 'success');
      document.querySelector('.btn-generate').disabled = true;

      try {
        const response = await fetch(`${API_BASE}/generate-v2`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ 
            url, 
            postType,
            composeImage: true,
            imageTemplate: template === 'auto' ? null : template
          })
        });

        if (!response.ok) throw new Error(`HTTP ${response.status}`);

        const data = await response.json();
        
        // 显示预览
        displayPreview(data);
        
        // 显示 JSON
        document.getElementById('json-output').value = JSON.stringify(data, null, 2);
        
        showStatus('✅ 生成成功！', 'success');
      } catch (error) {
        showStatus(`❌ 错误: ${error.message}`, 'error');
      } finally {
        document.querySelector('.btn-generate').disabled = false;
      }
    }

    function displayPreview(data) {
      const preview = document.getElementById('preview-content');
      
      if (!data.copies || data.copies.length === 0) {
        preview.innerHTML = '<p>没有生成内容</p>';
        return;
      }

      let html = `
        <div style="width:100%;text-align:left;">
          <h3>${data.product?.title || '商品'}</h3>
          <p style="color:#666;font-size:0.9rem;">品牌: ${data.product?.brand || 'N/A'}</p>
          <p style="color:#e74c3c;font-size:1.1rem;font-weight:bold;">
            ¥${data.product?.currentPrice} 
            <span style="text-decoration:line-through;color:#999;">¥${data.product?.originalPrice}</span>
          </p>
          <div style="margin-top:20px;">
      `;

      data.copies.forEach((copy, index) => {
        html += `
          <div style="background:#f9f9f9;padding:15px;margin:10px 0;border-radius:6px;">
            <p style="margin-bottom:8px;">
              <strong>文案 ${index + 1}</strong> 
              <button class="copy-btn" onclick="copyText('${copy.pin_title}')">复制</button>
            </p>
            <p style="font-weight:bold;color:#333;">${copy.pin_title}</p>
            <p style="color:#666;font-size:0.9rem;margin-top:8px;">${copy.pin_description}</p>
            <p style="color:#667eea;font-size:0.85rem;margin-top:8px;">标签: ${copy.hashtags}</p>
          </div>
        `;
      });

      if (data.copies[0]?.composed_image_url) {
        html += `<div style="margin-top:20px;"><img src="${data.copies[0].composed_image_url}" style="max-width:100%;border-radius:6px;"></div>`;
      }

      html += '</div></div>';
      preview.innerHTML = html;
      preview.classList.add('ready');
    }

    function switchTab(tab) {
      // 隐藏所有 tab
      document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
      document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
      
      // 显示选中的 tab
      document.getElementById(tab + '-tab').style.display = 'block';
      event.target.classList.add('active');
    }

    function copyText(text) {
      navigator.clipboard.writeText(text);
      alert('已复制！');
    }

    function copyJSON() {
      const json = document.getElementById('json-output').value;
      navigator.clipboard.writeText(json);
      alert('已复制 JSON！');
    }

    function exportData() {
      const format = document.getElementById('exportFormat').value;
      const url = document.getElementById('url').value;
      
      if (!url) {
        showStatus('请先生成内容', 'error');
        return;
      }

      window.location.href = `${API_BASE}/export?url=${encodeURIComponent(url)}&format=${format}&type=csv`;
    }

    function showStatus(message, type) {
      const status = document.getElementById('status');
      status.textContent = message;
      status.className = `status show ${type}`;
      setTimeout(() => status.classList.remove('show'), 5000);
    }

    function clearForm() {
      document.getElementById('url').value = '';
      document.getElementById('postType').value = 'deal';
      document.getElementById('template').value = 'auto';
      document.getElementById('preview-content').innerHTML = '等待输入...';
      document.getElementById('preview-content').classList.remove('ready');
    }
  </script>
</body>
</html>
