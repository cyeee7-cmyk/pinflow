<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PinFlow - Pinterest 自动化工具</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #fafaf9;
      color: #333;
      padding: 20px;
    }
    .container { max-width: 1200px; margin: 0 auto; }
    header { text-align: center; padding: 40px 0; }
    h1 { font-size: 3rem; margin-bottom: 20px; }
    p { font-size: 1.1rem; color: #666; margin-bottom: 30px; }
    .buttons { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
    button {
      padding: 14px 32px;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }
    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
    }
    .btn-secondary {
      background: white;
      color: #667eea;
      border: 2px solid #667eea;
    }
    .btn-secondary:hover {
      background: #f5f7ff;
    }
    .features { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; margin: 60px 0; }
    .feature-card {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .feature-card h3 { font-size: 1.3rem; margin-bottom: 10px; }
    .feature-card p { color: #666; }
    footer { text-align: center; padding: 40px 0; color: #999; border-top: 1px solid #eee; margin-top: 60px; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🎨 PinFlow</h1>
      <p>AI 驱动的 Pinterest 内容自动化生成工具</p>
      <div class="buttons">
        <button class="btn-primary" onclick="goToApp()">📱 打开工具</button>
        <button class="btn-secondary" onclick="scrollToFeatures()">📚 了解更多</button>
      </div>
    </header>

    <section class="features" id="features">
      <div class="feature-card">
        <h3>🔗 智能抓取</h3>
        <p>自动识别并抓取 Amazon 商品信息，包括标题、价格、图片等</p>
      </div>
      <div class="feature-card">
        <h3>✍️ AI 文案</h3>
        <p>使用 Claude AI 自动生成 Pinterest 优化的标题和描述</p>
      </div>
      <div class="feature-card">
        <h3>🎨 图片合成</h3>
        <p>自动合成专业级 Pinterest 配图，支持多种设计模板</p>
      </div>
      <div class="feature-card">
        <h3>📤 多格式导出</h3>
        <p>支持导出为 Tailwind、Later、Buffer 等多个平台的格式</p>
      </div>
    </section>

    <footer>
      <p>&copy; 2024 PinFlow. All rights reserved.</p>
      <p><a href="/app.html" style="color:#667eea;text-decoration:none;">→ 进入工具页面</a></p>
    </footer>
  </div>

  <script>
    console.log("✅ Page loaded successfully");
    
    function goToApp() {
      console.log("Navigate to app");
      window.location.href = '/app.html';
    }
    
    function scrollToFeatures() {
      document.getElementById('features').scrollIntoView({ behavior: 'smooth' });
    }
  </script>
</body>
</html>
